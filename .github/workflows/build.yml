name: Build & Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    # macOS 26 image: the app compiles against the macOS 26 SDK (Liquid Glass
    # `Glass`/`glassEffect`), which older runner images (macos-15/Xcode 16) lack.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build & test
        run: |
          xcodebuild test \
            -project Notchless.xcodeproj \
            -scheme Notchless \
            -destination 'platform=macOS' \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO
