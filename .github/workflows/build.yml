name: Build & Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build & test
        run: |
          xcodebuild test \
            -project Notchless.xcodeproj \
            -scheme Notchless \
            -destination 'platform=macOS' \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO
