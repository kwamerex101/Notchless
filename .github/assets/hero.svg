<svg viewBox="0 0 1200 500" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title id="title">Notchless</title>
  <desc id="desc">Notchless turns your Mac's notch into a Dynamic Island — live activities, Now Playing, dictation, and HUDs, native and on-device.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12151C"/>
      <stop offset="1" stop-color="#0A0C11"/>
    </linearGradient>
    <radialGradient id="glowT" cx="170" cy="70" r="460" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#35C6CE" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#35C6CE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowV" cx="1050" cy="470" r="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6C63E8" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#6C63E8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#35C6CE"/>
      <stop offset="1" stop-color="#6C63E8"/>
    </linearGradient>
    <linearGradient id="dot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF3B6B"/>
      <stop offset="1" stop-color="#FF8A3D"/>
    </linearGradient>
    <clipPath id="round"><rect x="0" y="0" width="1200" height="500" rx="28"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect x="0" y="0" width="1200" height="500" fill="url(#bg)"/>
    <rect x="0" y="0" width="1200" height="500" fill="url(#glowT)"/>
    <rect x="0" y="0" width="1200" height="500" fill="url(#glowV)"/>
    <rect x="0.5" y="0.5" width="1199" height="499" rx="27.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.06"/>

    <!-- The notch pill: an expanded Dynamic Island showing Now Playing -->
    <g>
      <rect x="336" y="54" width="528" height="104" rx="52" fill="#050505" stroke="#FFFFFF" stroke-opacity="0.07"/>
      <!-- album art -->
      <rect x="356" y="74" width="64" height="64" rx="16" fill="url(#accent)"/>
      <!-- live / recording dot -->
      <circle cx="414" cy="80" r="9" fill="url(#dot)" stroke="#050505" stroke-width="3"/>
      <!-- track text placeholders -->
      <rect x="440" y="80" width="150" height="10" rx="5" fill="#FFFFFF" fill-opacity="0.85"/>
      <rect x="440" y="100" width="96" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.42"/>
      <!-- scrubber -->
      <rect x="440" y="124" width="252" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.16"/>
      <rect x="440" y="124" width="150" height="4" rx="2" fill="url(#accent)"/>
      <circle cx="590" cy="126" r="6" fill="#FFFFFF"/>
      <!-- audio-reactive visualizer bars -->
      <g fill="#FFFFFF" fill-opacity="0.9">
        <rect x="712" y="116" width="8" height="18" rx="4"/>
        <rect x="728" y="98"  width="8" height="36" rx="4"/>
        <rect x="744" y="108" width="8" height="26" rx="4"/>
        <rect x="760" y="88"  width="8" height="46" rx="4"/>
        <rect x="776" y="112" width="8" height="22" rx="4"/>
        <rect x="792" y="94"  width="8" height="40" rx="4"/>
        <rect x="808" y="104" width="8" height="30" rx="4"/>
      </g>
    </g>

    <!-- wordmark -->
    <text x="600" y="252" text-anchor="middle" font-size="88" font-weight="800" letter-spacing="-3" fill="#F5F7FA">Notchless</text>
    <rect x="534" y="270" width="132" height="8" rx="4" fill="url(#accent)"/>

    <!-- tagline -->
    <text x="600" y="316" text-anchor="middle" font-size="26" font-weight="600" fill="#D3D8E2">Turn your Mac's notch into a Dynamic Island.</text>
    <text x="600" y="350" text-anchor="middle" font-size="16" fill="#8891A2">Native macOS &#183; SwiftUI + AppKit &#183; On-device ASR &amp; LLM &#183; macOS 14+</text>

    <!-- capability chips -->
    <g font-size="15" font-weight="600" fill="#C7CCD6" text-anchor="middle">
      <g>
        <rect x="276" y="392" width="150" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.10"/>
        <text x="351" y="417">Live Activities</text>
      </g>
      <g>
        <rect x="442" y="392" width="150" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.10"/>
        <text x="517" y="417">Now Playing</text>
      </g>
      <g>
        <rect x="608" y="392" width="150" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.10"/>
        <text x="683" y="417">Dictation</text>
      </g>
      <g>
        <rect x="774" y="392" width="150" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.10"/>
        <text x="849" y="417">Volume &amp; HUDs</text>
      </g>
    </g>
  </g>
</svg>
