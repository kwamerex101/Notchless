name: Notchless
options:
  bundleIdPrefix: com.rexdanquah
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  # Parakeet TDT (Core ML / Apple Neural Engine) speech engine. Apache-2.0.
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    exactVersion: 0.15.2
  # llama.cpp wrapper for on-device Gemma transcript cleanup. MIT.
  LLM:
    url: https://github.com/eastriverlee/LLM.swift
    branch: main

settings:
  base:
    SWIFT_VERSION: "5.0"          # Phase 1 uses Swift 5 language mode; flip to 6 during hardening
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "1.4.0"
    CURRENT_PROJECT_VERSION: "11"

targets:
  Notchless:
    type: application
    platform: macOS
    dependencies:
      - package: FluidAudio
        product: FluidAudio
      - package: LLM
        product: LLM
    sources:
      - Sources
      - path: Resources/Adapter
        type: folder
        buildPhase: resources
      - path: Resources/AppIcon.icns
        buildPhase: resources
      - path: Resources/Sounds
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Notchless.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.rexdanquah.Notchless
        GENERATE_INFOPLIST_FILE: NO
        # Stable Developer ID signature (HOMEKARE) so macOS keeps TCC grants
        # (Accessibility, Camera, …) across rebuilds instead of re-prompting.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application"
        # Team ID comes from the DEVELOPMENT_TEAM env var (kept out of the public
        # repo). Set `export DEVELOPMENT_TEAM=<teamid>` in your shell before
        # `xcodegen generate` for signed local builds; CI builds unsigned.
        DEVELOPMENT_TEAM: "${DEVELOPMENT_TEAM}"
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
      configs:
        Debug:
          # Dev tooling (GoalSelfTest/DebugRender) compiles only under DEBUG.
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          ENABLE_HARDENED_RUNTIME: NO
        Release:
          # Required for Apple notarization; the distributed DMG must have it on.
          ENABLE_HARDENED_RUNTIME: YES

  NotchlessTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        excludes:
          - Fixtures
      - path: Tests/Fixtures
        type: folder
        buildPhase: resources
    dependencies:
      - target: Notchless
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rexdanquah.NotchlessTests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application"
        DEVELOPMENT_TEAM: "${DEVELOPMENT_TEAM}"
        MACOSX_DEPLOYMENT_TARGET: "14.0"

schemes:
  Notchless:
    build:
      targets:
        Notchless: all
    test:
      targets:
        - NotchlessTests
